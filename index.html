<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倉儲溫溼度記錄表</title>

<style>
body {
  font-family: sans-serif;
  padding:20px;
  background:#f5f5f5;
}

.card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

h2 {
  margin-top:0;
}

.notice {
  background:＃FFFAF0;
  color:＃000000;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
  margin-bottom:15px;
  text-align:left;
}

input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid #ccc;
  font-size:16px;
  box-sizing:border-box;
}

/* 🔴 異常紅框 */
input.warning {
  border:2px solid red;
  background:#fff5f5;
}

button {
  width:100%;
  padding:12px;
  margin-top:15px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:8px;
  font-size:16px;
  transition:0.2s;
}

button:active {
  transform: scale(0.96);
}

button.loading {
  background:#999;
}

button:disabled {
  opacity:0.6;
}

#msg {
  margin-top:15px;
}

.warning-text {
  color:red;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
  
<h2 id="title">設備記錄</h2>



  <!-- 🔥 新增頻率文字 -->
 
  <div class="notice">
    頻率：每小時記錄一次 
  </div>
  
  
  <!-- 溫度 -->
  <input
    id="temp"
    type="number"
    step="0.1"
    placeholder="請輸入溫度 (°C)"
  >

  <div id="alert" class="warning-text"></div>

  <!-- 🔥 新增濕度 -->
  <input
    id="humidity"
    type="number"
    step="0.1"
    placeholder="請輸入濕度 (%)"
  >

  <!-- 姓名 -->
  <input
    id="name"
    placeholder="請輸入姓名"
  >

  <!-- 備註 -->
  <input
    id="remark"
    placeholder="備註(若有異常請填寫原因)"
  >

  <!-- 按鈕 -->
  <button id="submitBtn" onclick="send()">
    送出
  </button>

  <p id="msg"></p>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbww_TtbMuR-cHUNWCr1n1ARiaHx_n7fP-8yW6TaOrq3AdBlXEbF3C8f5vS0UX0lyBdS/exec";


// 🔵 取得設備
function getDevice(){
  return new URLSearchParams(window.location.search).get("device");
}

const device = getDevice();

const tempInput = document.getElementById("temp");
const alertBox = document.getElementById("alert");


// 🔵 顯示標題
document.getElementById("title").innerText =
  device
    ? device + " 溫溼度記錄"
    : "⚠️ 未指定設備";


// 🔥 異常判斷
tempInput.addEventListener("input", () => {

  const temp = parseFloat(tempInput.value);

  if(isNaN(temp)){
    alertBox.innerText = "";
    tempInput.classList.remove("warning");
    return;
  }

  // 冷藏 > 7
  if(device.includes("冷藏") && temp > 7){

    alertBox.innerText =
      "⚠️ 溫度過高（冷藏應 ≤ 7°C）";

    tempInput.classList.add("warning");
  }

  // 冷凍 > -18
  else if(device.includes("冷凍") && temp > -18){

    alertBox.innerText =
      "⚠️ 溫度過高（冷凍應 ≤ -18°C）";

    tempInput.classList.add("warning");
  }

  else{

    alertBox.innerText = "";
    tempInput.classList.remove("warning");
  }
});


// 🔥 送出
function send(){

  const btn = document.getElementById("submitBtn");
  const msg = document.getElementById("msg");

  const temp =
    document.getElementById("temp").value.trim();

  // 🔥 新增濕度
  const humidity =
    document.getElementById("humidity").value.trim();

  const name =
    document.getElementById("name").value.trim();

  const remark =
    document.getElementById("remark").value.trim();


  // 檢查設備
  if(!device){

    msg.innerText = "❌ 沒有設備參數";
    return;
  }

  // 檢查溫度
  if(!temp){

    msg.innerText = "⚠️ 請輸入溫度";
    return;
  }

  // 🔥 檢查濕度
  if(!humidity){

    msg.innerText = "⚠️ 請輸入濕度";
    return;
  }

  // 檢查姓名
  if(!name){

    msg.innerText = "⚠️ 請輸入姓名";
    return;
  }


  // 🔴 異常強制備註
  const t = parseFloat(temp);

  if(
    (device.includes("冷藏") && t > 7) ||
    (device.includes("冷凍") && t > -18)
  ){

    if(!remark){

      msg.innerText = "⚠️ 異常請填寫備註";
      return;
    }
  }


  // 🔵 UI 狀態
  btn.disabled = true;
  btn.classList.add("loading");
  btn.innerText = "送出中...";
  msg.innerText = "";


  // 🔥 寫入 Apps Script
  fetch(API_URL, {

    method: "POST",

    body: new URLSearchParams({

      action: "write",

      temp: temp,

      // 🔥 新增濕度
      humidity: humidity,

      name: name,

      remark: remark,

      device: device
    })
  })

  .then(() => {

    // ✅ 完成畫面
    document.body.innerHTML = `
      <div style="
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        flex-direction:column;
        font-family:sans-serif;
      ">
        <h1>✅ 已送出</h1>
        <p>可直接關閉此頁面</p>
      </div>
    `;
  })

  .catch(() => {

    msg.innerText = "❌ 寫入失敗";

    btn.disabled = false;
    btn.classList.remove("loading");
    btn.innerText = "送出";
  });
}

</script>

</body>
</html>
